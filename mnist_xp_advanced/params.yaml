id: MNIST_train_advanced
title: "MNIST training"
description: "Training a simple CNN model on MNIST"

# what experiment file to run
module: mnist_xp_advanced.experiment
pythonpath: [..]
dirty_git: warn

# Launcher configuration: what resources we need to run a Task
launcher: "duration=1h & gpu(mem=4G)*1 & cpu(cores=4)"

# Experimental parameters, 
# Here we are using GridSearch: they can either be a single value or a list of values to explore
n_layers: 1     # Single value: 
kernel_size:       # kernel size of the convolutions
    - 1
    - 3
hidden_dim:     # list of values to explore for the hidden dimension of the CNN
    range: [32, 128, 32]  # range of values to explore

# Training parameters
epochs: 1       # number of epochs to train
lr: 1e-3        # learning rate
batch_size: 64  # batch size
n_val: 100      # number of steps between validation and logging
