# Experimaestro Demo Workspace settings
# see https://experimaestro-python.readthedocs.io/en/latest/settings/ for more options

workspaces:
  # The `triggers:` field auto-selects this workspace when the experiment id
  # matches a glob — no `--workspace` / `--workdir` flag needed.
  # The first workspace is also used as the default fallback.
  - id: mnist
    path: ~/experiments/mnist_xp
    triggers:
      - "MNIST_*"
