id: MNIST_train_ci
title: "MNIST training (CI smoke test)"
description: "Fast CI smoke test: single tiny model, 1 epoch, fake data"

# what experiment file to run
module: mnist_xp.experiment
pythonpath: [..]

# CI checkouts are clean; don't fail if experimaestro is installed from git
dirty_git: ignore

# CPU-only launcher: GitHub-hosted runners have no GPU, so we must not request one
launcher: "duration=10m & cpu(cores=1)"

# Use a tiny randomly-generated dataset instead of downloading MNIST
fake_data: true

# Smallest possible grid: a single (tiny) model
hidden_dim:
    - 2
n_layers:
    - 1
kernel_size:
    - 1

# Training parameters (kept minimal for speed)
epochs: 1
lr: 1e-3
batch_size: 64
n_val: 100
